<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Patio de Contenedores</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.py"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>

body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    color: var(--text-dark);
    
    /* --- CONFIGURACIÓN DE LA IMAGEN DE FONDO --- */
    
    /* 1. Capa de superposición (OVERLAY): Un degradado semi-transparente que oscurece la imagen. */
    background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                      /* 2. URL de la imagen (Ejemplo de puerto de contenedores) */
                      url('https://images.unsplash.com/photo-1579737494541-118e983f4f10?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); 

    /* 3. Propiedades para que la imagen se vea bien */
    background-size: cover;          /* Asegura que la imagen cubra todo el viewport */
    background-position: center center; /* Centra la imagen */
    background-attachment: fixed;    /* Fija la imagen para que el contenido se desplace sobre ella */
}



    /* Variables de colores */
    :root {
        --primary-color: #3f51b5; /* Azul índigo */
        --primary-light: #757de8;
        --primary-dark: #002984;
        --accent-color: #ff4081; /* Rosa fucsia */
        --accent-light: #ff79b0;
        --accent-dark: #c60055;

        --bg-gradient-start: #e0f2f7; /* Azul claro */
        --bg-gradient-end: #f0f4f8; /* Gris azulado claro */

        --text-dark: #263238; /* Gris muy oscuro */
        --text-light: #eceff1; /* Gris muy claro */
        --card-bg: #ffffff;
        --border-color: #cfd8dc; /* Gris de borde */
        --shadow-light: rgba(0, 0, 0, 0.08);
        --shadow-medium: rgba(0, 0, 0, 0.15);
    }

    body {
        font-family: 'Roboto', sans-serif; /* Usaremos Roboto, que es común y limpia */
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
        color: var(--text-dark);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start; /* Alinea arriba en lugar de centrar verticalmente */
    }

    .container {
        max-width: 1100px;
        width: 100%;
        margin: 40px auto; /* Más margen arriba y abajo */
        background: var(--card-bg);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px var(--shadow-medium);
        box-sizing: border-box; /* Incluye padding en el width */
    }

    h1 {
        color: var(--primary-dark);
        border-bottom: 3px solid var(--primary-light);
        padding-bottom: 15px;
        margin-bottom: 40px;
        font-size: 2.8em;
        text-align: center;
        letter-spacing: 1px;
    }

    h2 {
        color: var(--text-dark);
        margin-top: 35px;
        margin-bottom: 25px;
        font-size: 1.8em;
        border-left: 5px solid var(--accent-color);
        padding-left: 10px;
    }

    .controls {
        background: var(--bg-gradient-end); /* Un fondo más claro para los controles */
        padding: 30px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        box-shadow: 0 5px 15px var(--shadow-light);
        margin-bottom: 30px;
    }

    .input-group {
        margin-bottom: 25px;
    }

    label {
        display: block;
        margin-bottom: 10px;
        font-weight: 500;
        color: var(--text-dark);
        font-size: 1.1em;
    }

    input[type="number"],
    input[type="range"] {
        width: calc(100% - 20px); /* Ajuste por padding */
        padding: 12px 10px;
        box-sizing: border-box;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1em;
        transition: all 0.3s ease;
        background-color: #fafafa;
    }

    input[type="number"]:focus,
    input[type="range"]:focus {
        border-color: var(--primary-light);
        box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.2);
        outline: none;
    }

    /* Estilo del botón */
    button {
        background-color: var(--primary-color);
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.1em;
        font-weight: bold;
        transition: background-color 0.3s ease, transform 0.2s ease;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        display: block; /* Para que ocupe todo el ancho */
        width: 100%;
        max-width: 300px; /* Ancho máximo para el botón */
        margin: 0 auto; /* Centrar el botón */
    }

    button:hover {
        background-color: var(--primary-dark);
        transform: translateY(-2px); /* Efecto ligero de elevación */
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
    }

    #loading {
        display: none;
        color: var(--accent-color);
        font-style: italic;
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
    }

    /* Estilos para las métricas (tarjetas individuales) */
    .metric-grid {
        display: grid; /* Usamos Grid para un control más preciso */
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Columnas responsivas */
        gap: 25px;
        margin-bottom: 40px;
    }

    .metric {
        background-color: var(--card-bg);
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 5px 15px var(--shadow-light);
        text-align: center;
        border-left: 5px solid; /* Borde lateral de color */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: transform 0.2s ease;
    }
    .metric:hover {
        transform: translateY(-5px);
    }
    
    .metric-title {
        font-size: 1.2em;
        font-weight: bold;
        color: var(--text-dark);
        margin-bottom: 10px;
    }
    .metric-value {
        display: block;
        font-size: 2.5em;
        font-weight: 700;
        margin-top: 10px;
        line-height: 1;
    }
    .metric-unit {
        font-size: 0.9em;
        color: #607d8b; /* Gris más suave */
        margin-top: 5px;
    }

    /* Colores específicos para cada métrica */
    .metric.avg-time { border-left-color: #00bcd4; } /* Cian */
    .metric.avg-time .metric-value { color: #00bcd4; }
    .metric.max-time { border-left-color: #ff9800; } /* Naranja */
    .metric.max-time .metric-value { color: #ff9800; }
    .metric.truck-count { border-left-color: var(--accent-color); } /* Rosa (accent) */
    .metric.truck-count .metric-value { color: var(--accent-color); }

    /* Estilos de gráficos */
    #timeChart {
        background-color: var(--card-bg);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px var(--shadow-light);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .container {
            margin: 20px;
            padding: 25px;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 30px;
        }
        h2 {
            font-size: 1.5em;
        }
        .metric-grid {
            grid-template-columns: 1fr; /* Una columna en móviles */
        }
        button {
            width: 100%;
            max-width: none;
        }
    }
    @media (max-width: 480px) {
        body { padding: 10px; }
        .container { padding: 15px; margin: 15px auto; }
        h1 { font-size: 1.8em; }
        .controls, .metric { padding: 20px; }
        label { font-size: 1em; }
    }

</style>
</head>
<body>





    
    <div class="container">
        <h1> Simulador de Patio de Contenedores</h1>
        <div class="controls">
            <h2>Parámetros de Simulación</h2>
            <div class="input-group">
                <label for="numGruas">Número de Grúas (1-10):</label>
                <input type="number" id="numGruas" value="2" min="1" max="10">
            </div>
            <div class="input-group">
                <label for="probFallaB">Probabilidad de Falla (Transportista B, 0.0-1.0): <span id="probVal">0.25</span></label>
                <input type="range" id="probFallaB" value="0.25" min="0.0" max="1.0" step="0.05" oninput="document.getElementById('probVal').innerText = this.value">
            </div>
            <div class="input-group">
                <label for="tiempoSim">Tiempo a Simular (minutos):</label>
                <input type="number" id="tiempoSim" value="480" min="60" step="60">
            </div>
            <button onclick="runSimulation()">Ejecutar Simulación</button>
            <p id="loading">Cargando simulación...</p>
        </div>

<div class="results">
    <h2>Resultados de la Simulación</h2>
    
    <div class="metric-grid"> 
        <div class="metric avg-time">
            <div class="metric-title">Tiempo Promedio en Patio</div>
            <span class="metric-value" id="avgTime">N/A</span>
            <div class="metric-unit">min</div>
        </div>
        <div class="metric max-time">
            <div class="metric-title">Tiempo Máximo en Patio</div>
            <span class="metric-value" id="maxTime">N/A</span>
            <div class="metric-unit">min</div>
        </div>
        <div class="metric truck-count">
            <div class="metric-title">Camiones Procesados</div>
            <span class="metric-value" id="truckCount">N/A</span>
            <div class="metric-unit">unidades</div>
        </div>
    </div>
    
    <div style="margin-top: 20px; width: 100%; height: 400px;">
        <canvas id="timeChart"></canvas>
    </div>
</div>

        
    </div>

    <script>
        const ctx = document.getElementById('timeChart').getContext('2d');
        let chart;

        // Función para enviar los datos al servidor Python
        async function runSimulation() {
            const numGruas = document.getElementById('numGruas').value;
            const probFallaB = document.getElementById('probFallaB').value;
            const tiempoSim = document.getElementById('tiempoSim').value;

            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch('/simulate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        numGruas: numGruas,
                        probFallaB: probFallaB,
                        tiempoSim: tiempoSim
                    })
                });

                if (!response.ok) {
                    throw new Error(`Error del servidor: ${response.status}`);
                }

                const data = await response.json();
                
                // Actualizar métricas
                document.getElementById('avgTime').innerText = data.promedio.toFixed(2);
                document.getElementById('maxTime').innerText = data.maximo.toFixed(2);
                document.getElementById('truckCount').innerText = data.camiones;

                // Dibujar el gráfico
                updateChart(data.datos_crudos);

            } catch (error) {
                alert('Ocurrió un error al ejecutar la simulación: ' + error.message);
                console.error(error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Función para actualizar el gráfico con los datos de SimPy
        function updateChart(data) {
            if (chart) {
                chart.destroy();
            }

            // Usamos un histograma para mostrar la distribución de los tiempos de ciclo
            const bins = 10;
            const minVal = Math.min(...data);
            const maxVal = Math.max(...data);
            const range = maxVal - minVal;
            const binSize = range / bins;
            const counts = new Array(bins).fill(0);
            const labels = [];

            data.forEach(d => {
                let binIndex = Math.floor((d - minVal) / binSize);
                if (binIndex === bins) binIndex--; // Asegura que el valor máximo caiga en el último bin
                if (binIndex >= 0 && binIndex < bins) {
                    counts[binIndex]++;
                }
            });

            for (let i = 0; i < bins; i++) {
                labels.push(`${(minVal + i * binSize).toFixed(1)} - ${(minVal + (i + 1) * binSize).toFixed(1)}`);
            }

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Frecuencia de Tiempos en Patio (min)',
                        data: counts,
                        backgroundColor: 'rgba(75, 192, 192, 0.6)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: 'Número de Camiones' }
                        },
                        x: {
                            title: { display: true, text: 'Rango de Tiempo (min)' }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
